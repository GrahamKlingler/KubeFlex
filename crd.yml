apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: flexjobs.example.com
spec:
  group: example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                completions:
                  type: integer
                parallelism:
                  type: integer
                metadata:
                  type: object
                  properties:
                    name:
                      type: string
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                template:
                  type: object
                  properties:
                    metadata:
                      type: object
                      properties:
                        labels:
                          type: object
                          additionalProperties:
                            type: string
                        annotations:
                          type: object
                          additionalProperties:
                            type: string
                    spec:
                      type: object
                      properties:
                        containers:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              image:
                                type: string
                              command:
                                type: array
                                items:
                                  type: string
                              args:
                                type: array
                                items:
                                  type: string
                              stdin:
                                type: boolean
                              tty:
                                type: boolean
                              ports:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    name:
                                      type: string
                                    containerPort:
                                      type: integer
                        restartPolicy:
                          type: string
                        nodeSelector:
                          type: object
                          additionalProperties:
                            type: string
  scope: Namespaced
  names:
    plural: flexjobs
    singular: flexjob
    kind: FlexJob
    shortNames:
      - fj
