apiVersion: example.com/v1
kind: FlexJob
metadata:
  name: test-job
  namespace: default

spec:
  replicas: 1
  completions: 1
  parallelism: 1
  metadata:
    name: test-job
    labels:
      app: nginx-pod
  template:
    metadata:
      labels:
        app: test-server
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        stdin: true
        tty: true
        ports:
        - name: http
          containerPort: 80
      restartPolicy: Never