apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: foo
  labels:
    name: test-pod
  annotations:
    REGION: "TEN"
    EXPECTED_DURATION: "12"
spec:
  # # For the control-plane
  # tolerations:
  # - key: "node-role.kubernetes.io/control-plane"
  #   operator: Exists
  #   effect: NoSchedule
  # - key: "node.kubernetes.io/unreachable"
  #   operator: Exists
  #   effect: NoExecute
  # - key: "node-role.kubernetes.io/master"
  #   operator: Exists
  #   effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: "REGION"
            operator: In
            values:
            - "TEN"
  containers:
  - name: test-container
    image: busybox:latest
    command: ["sh", "-c", "echo Hello Kubernetes! && sleep 6000"]
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        memory: "128Mi"
        cpu: "1000m"
      limits:
        memory: "256Mi"
        cpu: "2000m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
---
