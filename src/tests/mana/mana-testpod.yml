apiVersion: v1
kind: Pod
metadata:
  name: nbody-mana-pod
  namespace: test-namespace
  labels:
    name: nbody-mana-pod
  annotations:
    REGION: "NE"
    EXPECTED_DURATION: "120"
spec:
  restartPolicy: Never
  containers:
  - name: test-container
    image: nbody-mana:local
    imagePullPolicy: IfNotPresent
    command: ["/usr/bin/tini", "--"]
    args: ["/bin/bash", "-c", "echo 'MANA test pod started' && /tmp/run_nbody_mana.sh --bodies=__BODIES__ --iters=__ITERS__ --np=__NP__ --checkpoint-interval=__CHECKPOINT__ --results-folder=/results/"]
    resources:
      requests:
        memory: "256Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    - name: ssh
      containerPort: 22
      protocol: TCP
    volumeMounts:
    - name: checkpoint-volume
      mountPath: /tmp/checkpoints
    - name: mana-ckpt
      mountPath: /tmp/mana-ckpt
    - name: script-data
      mountPath: /script-data
    - name: results
      mountPath: /results
  volumes:
  - name: checkpoint-volume
    hostPath:
      path: /tmp/checkpoints
      type: DirectoryOrCreate
  - name: mana-ckpt
    hostPath:
      path: /tmp/mana-ckpt
      type: DirectoryOrCreate
  - name: script-data
    emptyDir: {}
  - name: results
    emptyDir: {}
