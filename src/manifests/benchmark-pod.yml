apiVersion: v1
kind: Pod
metadata:
  name: benchmark-pod
  namespace: foo
  labels:
    name: benchmark-pod
  annotations:
    REGION: "TEN"
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "REGION"
            operator: In
            values:
            - "TEN"
  containers:
  - name: benchmark-container
    image: salamander1223/benchmark:latest
    imagePullPolicy: IfNotPresent
    command: ["/bin/bash", "-c"]
    args:
    - |
      # Start stress test in background
      cd /test && \
      nohup ./stress_test $STRESS_THREAD_COUNT > /dev/null 2>&1 &
      
      # Keep container running
      tail -f /dev/null
    env:
    - name: STRESS_THREAD_COUNT
      value: "4"
    securityContext:
      privileged: true  # Required for CRIU operations
      capabilities:
        add:
        - SYS_ADMIN  # Required for checkpoint/restore
        - NET_ADMIN  # Required for network operations
        - SYS_PTRACE # Required for process access
        - SYS_RESOURCE # Required for resource management
        - ALL
    resources:
      requests:
        memory: "512Mi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    volumeMounts:
    - name: checkpoint-dir
      mountPath: /tmp/checkpoint
    - name: proc
      mountPath: /proc
    - name: sys
      mountPath: /sys
    - name: dev
      mountPath: /dev
    - name: var-run
      mountPath: /var/run
    - name: cgroup
      mountPath: /sys/fs/cgroup
  volumes:
  - name: checkpoint-dir
    emptyDir: {}
  - name: proc
    hostPath:
      path: /proc
  - name: sys
    hostPath:
      path: /sys
  - name: dev
    hostPath:
      path: /dev
  - name: var-run
    hostPath:
      path: /var/run
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup 