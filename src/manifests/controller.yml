apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: monitor
  annotations:
    seccomp.security.alpha.kubernetes.io/pod: docker/default
  labels:
    app: controller
spec:
  selector:
    matchLabels:
      name: controller
  template:
    metadata:
      labels:
        name: controller
    spec:
      serviceAccountName: controller-account
      terminationGracePeriodSeconds: 10
      # # For the control-plane
      # tolerations:
      # - key: "node-role.kubernetes.io/control-plane"
      #   operator: Exists
      #   effect: NoSchedule
      # - key: "node.kubernetes.io/unreachable"
      #   operator: Exists
      #   effect: NoExecute
      # - key: "node-role.kubernetes.io/master"
      #   operator: Exists
      #   effect: NoSchedule  
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: "kubernetes.io/hostname"
                operator: In
                values:
                - kind-worker
                - kind-worker2
      containers:
      - name: python-controller
        image: salamander1223/python-controller:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        resources:
          limits:
            cpu: 200m
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: run
          mountPath: /var/run
          readOnly: false
        - name: kube-config
          mountPath: /root/.kube
        ports:
        - name: main-http
          containerPort: 8081
          protocol: TCP
        command: ["python3", "controller/main.py"]
        args:
        - "--namespace"
        - "test-namespace"
        - "--skip-migration"
        env:
        - name: CADVISOR_URL
          value: "http://127.0.0.1:8080"
        - name: POLLING_INTERVAL
          value: "24"
        - name: STORAGE_PATH
          value: "/storage"
        - name: POD_SELECTOR
          value: "io.kubernetes.pod.namespace=test-namespace"
        - name: CARBON_SERVER_URL
          value: "http://metadata-service:8008"
        - name: SCHEDULER_TIME
          valueFrom:
            configMapKeyRef:
              name: scheduler-config
              key: scheduler-time
        - name: SCHEDULING_POLICY
          valueFrom:
            configMapKeyRef:
              name: scheduler-config
              key: scheduling-policy
      
      volumes:
      - name: kube-config
        hostPath:
          path: /root/.kube
          type: DirectoryOrCreate
      - name: run
        hostPath:
          path: /var/run
          type: Directory
