apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: monitor
  labels: 
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: "kubernetes.io/hostname"
                operator: In
                values:
                - kind-worker
    spec:
      containers:
      - name: postgres-container
        image: bitnami/postgresql:latest
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        env:
        - name: POSTGRES_USER
          value: "sfarokhi"
        - name: POSTGRES_PASSWORD
          value: "wordpass"
        - name: POSTGRES_DB
          value: "postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-upload
  namespace: monitor
  labels:
    app: db-upload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-upload
  template:
    metadata:
      labels:
        app: db-upload
    spec:
      initContainers:
      - name: wait-for-db
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z db-service 5432; do echo waiting for db-service; sleep 2; done;']
      containers:
      - name: db-upload-container
        image: salamander1223/python-db-upload:latest
        command: ["python", "upload_data.py", "test_data", "table"]
        args:
        - --host=db-service
        - --port=5432
        - --dbname=postgres
        - --user=sfarokhi
        - --password=wordpass
        securityContext:
          privileged: true
        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: monitor
spec:
  type: LoadBalancer
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432