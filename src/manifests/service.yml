apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: cadvisor
spec:
  selector:
    name: cadvisor
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor-external
  namespace: cadvisor
spec:
  type: NodePort
  selector:
    name: cadvisor
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    nodePort: 30081