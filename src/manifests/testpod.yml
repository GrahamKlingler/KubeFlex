apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: foo
  labels:
    name: test-pod
  annotations:
    REGION: "TEN"
    EXPECTED_DURATION: "12"
spec:
  # # For the control-plane
  # tolerations:
  # - key: "node-role.kubernetes.io/control-plane"
  #   operator: Exists
  #   effect: NoSchedule
  # - key: "node.kubernetes.io/unreachable"
  #   operator: Exists
  #   effect: NoExecute
  # - key: "node-role.kubernetes.io/master"
  #   operator: Exists
  #   effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "REGION"
            operator: In
            values:
            - "TEN"
  containers:
  - name: test-container
    image: debian:latest
    command: ["/bin/bash", "-c"]
    args:
    - |
      # MAIN THREAD
      # Create the test script
      cat > /tmp/simple_test.sh << 'EOF'
      #!/bin/bash
      
      # Function to handle signals
      cleanup() {
          echo "Process shutting down" >> /tmp/container.log
          exit 0
      }
      
      # Set up signal handlers
      trap cleanup SIGTERM SIGINT
      
      # Initialize counter
      counter=0
      
      # Main loop
      while true; do
          echo "Counter: $counter, Time: $(date)" >> /tmp/container.log
          counter=$((counter + 1))
          sleep 60
      done
      EOF
      
      # Make script executable
      chmod +x /tmp/simple_test.sh && \
      
      # Install monitoring tools
      apt-get update && \
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends criu htop procps psmisc && \
      apt-get clean && \
      rm -rf /var/lib/apt/lists/* && \
      
      # Start the script in background with proper process hierarchy
      exec /tmp/simple_test.sh
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true  # Required for CRIU operations
      capabilities:
        add:
        - SYS_ADMIN  # Required for checkpoint/restore
        - NET_ADMIN  # Required for network operations
        - SYS_PTRACE # Required for process access
        - SYS_RESOURCE # Required for resource management
        - ALL
    resources:
      requests:
        memory: "128Mi"
        cpu: "1000m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    volumeMounts:
    - name: checkpoint-dir
      mountPath: /tmp/checkpoint
    - name: proc
      mountPath: /proc
    - name: sys
      mountPath: /sys
    - name: dev
      mountPath: /dev
    - name: var-run
      mountPath: /var/run
    - name: cgroup
      mountPath: /sys/fs/cgroup
  volumes:
  - name: checkpoint-dir
    emptyDir: {}
  - name: proc
    hostPath:
      path: /proc
  - name: sys
    hostPath:
      path: /sys
  - name: dev
    hostPath:
      path: /dev
  - name: var-run
    hostPath:
      path: /var/run
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup
