apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: foo
  labels:
    name: test-pod
  annotations:
    REGION: "TEN"
    EXPECTED_DURATION: "12"
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "REGION"
            operator: In
            values:
            - "TEN"
  containers:
  - name: test-container
    image: salamander1223/testpod:latest
    imagePullPolicy: Always
    command: ["/usr/bin/tini", "--"]
    args: ["/bin/bash", "-c", "echo 'Test pod started' && /tmp/simple_test.sh"]
    securityContext:
      privileged: true
      capabilities:
        add:
        - SYS_PTRACE
        - SYS_RESOURCE  
        - NET_ADMIN
        - SYS_ADMIN
        - CHECKPOINT_RESTORE
        - SYS_CHROOT
        - SETPCAP
        - SETGID
        - SETUID
      seccompProfile:
        type: Unconfined
      allowPrivilegeEscalation: true
    resources:
      requests:
        memory: "10Mi"
        cpu: "10m"
      limits:
        memory: "1000Mi"
        cpu: "500m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    - name: ssh
      containerPort: 22
      protocol: TCP
    env:
    - name: TEST_MODE
      value: "simple"
    - name: LOG_FILE
      value: "/tmp/container.log"
    volumeMounts:
    - name: checkpoint-volume
      mountPath: /tmp/checkpoints
    - name: script-data
      mountPath: /script-data
  volumes:
  - name: checkpoint-volume
    hostPath:
      path: /tmp/checkpoints
      type: Directory
  - name: script-data
    emptyDir: {}