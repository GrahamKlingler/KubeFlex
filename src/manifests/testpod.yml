apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: foo
  labels:
    name: test-pod
  annotations:
    REGION: "TEN"
    EXPECTED_DURATION: "12"
spec:
  # # For the control-plane
  # tolerations:
  # - key: "node-role.kubernetes.io/control-plane"
  #   operator: Exists
  #   effect: NoSchedule
  # - key: "node.kubernetes.io/unreachable"
  #   operator: Exists
  #   effect: NoExecute
  # - key: "node-role.kubernetes.io/master"
  #   operator: Exists
  #   effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "REGION"
            operator: In
            values:
            - "TEN"
  containers:
  - name: test-container
    image: debian:latest
    command: ["/bin/bash", "-c"]
    args:
    - |
      # Create the test program
      cat > /tmp/simple_test.c << 'EOF'
      #include <stdio.h>
      #include <unistd.h>
      #include <time.h>
      #include <signal.h>
      #include <sys/types.h>
      #include <fcntl.h>

      volatile int running = 1;

      void handle_signal(int sig) {
          running = 0;
      }

      int main() {
          // Redirect stdout/stderr to avoid TTY issues but don't fully daemonize
          freopen("/dev/null", "w", stdout);
          freopen("/dev/null", "w", stderr);
          
          signal(SIGTERM, handle_signal);
          signal(SIGINT, handle_signal);
          
          FILE *f = fopen("/tmp/container.log", "a");
          if (!f) return 1;
          
          int counter = 0;
          while (running) {
              time_t now = time(NULL);
              fprintf(f, "Counter: %d, Time: %s", counter++, ctime(&now));
              fflush(f);
              sleep(60);
          }
          
          fprintf(f, "Process shutting down\n");
          fclose(f);
          return 0;
      }
      EOF

      # Install gcc and compile
      apt-get update && \
      apt-get install -y gcc && \
      gcc -o /tmp/simple_test /tmp/simple_test.c && \
      rm /tmp/simple_test.c && \
      apt-get remove -y gcc && \
      apt-get autoremove -y && \
      apt-get clean && \
      rm -rf /var/lib/apt/lists/* && \
      
      # Start the program in background and save PID
      nohup /tmp/simple_test </dev/null >/dev/null 2>&1 & \
      echo $! > /tmp/test.pid && \
      
      # Monitor the process
      while true; do \
        if [ -f /tmp/test.pid ]; then \
          pid=$(cat /tmp/test.pid); \
          if ps -p $pid > /dev/null 2>&1; then \
            echo "Process running with PID: $pid" > /tmp/status.log; \
          else \
            echo "Process not running" > /tmp/status.log; \
          fi; \
        fi; \
        sleep 60; \
      done
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true  # Required for CRIU operations
      capabilities:
        add:
        # - SYS_ADMIN  # Required for checkpoint/restore
        # - NET_ADMIN  # Required for network operations
        # - SYS_PTRACE # Required for process access
        # - SYS_RESOURCE # Required for resource management
        - ALL
    resources:
      requests:
        memory: "128Mi"
        cpu: "1000m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    volumeMounts:
    - name: checkpoint-dir
      mountPath: /tmp/checkpoint
    - name: proc
      mountPath: /proc
    - name: sys
      mountPath: /sys
    - name: dev
      mountPath: /dev
    - name: var-run
      mountPath: /var/run
    - name: cgroup
      mountPath: /sys/fs/cgroup
  volumes:
  - name: checkpoint-dir
    emptyDir: {}
  - name: proc
    hostPath:
      path: /proc
  - name: sys
    hostPath:
      path: /sys
  - name: dev
    hostPath:
      path: /dev
  - name: var-run
    hostPath:
      path: /var/run
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup
