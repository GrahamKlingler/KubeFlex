apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: foo
  labels:
    name: test-pod
  annotations:
    REGION: "TEN"
    EXPECTED_DURATION: "12"
spec:
  # # For the control-plane
  # tolerations:
  # - key: "node-role.kubernetes.io/control-plane"
  #   operator: Exists
  #   effect: NoSchedule
  # - key: "node.kubernetes.io/unreachable"
  #   operator: Exists
  #   effect: NoExecute
  # - key: "node-role.kubernetes.io/master"
  #   operator: Exists
  #   effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "REGION"
            operator: In
            values:
            - "TEN"
  containers:
  - name: test-container
    image: debian:latest
    command: ["/bin/bash", "-c"]
    args:
    - |
      apt-get update && \
      apt-get install -y procps && \
      counter=1; \
      while true; do \
        echo "Counter: $counter"; \
        counter=$((counter+1)); \
        sleep 60; \
      done
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true  # Required for CRIU operations
      capabilities:
        add:
        - SYS_ADMIN  # Required for checkpoint/restore
        - NET_ADMIN  # Required for network operations
        - SYS_PTRACE # Required for process access
    resources:
      requests:
        memory: "128Mi"
        cpu: "1000m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    volumeMounts:
    - name: checkpoint-dir
      mountPath: /tmp/checkpoint
    - name: proc
      mountPath: /proc
    - name: sys
      mountPath: /sys
    - name: dev
      mountPath: /dev
    - name: var-run
      mountPath: /var/run
    - name: cgroup
      mountPath: /sys/fs/cgroup
  volumes:
  - name: checkpoint-dir
    emptyDir: {}
  - name: proc
    hostPath:
      path: /proc
  - name: sys
    hostPath:
      path: /sys
  - name: dev
    hostPath:
      path: /dev
  - name: var-run
    hostPath:
      path: /var/run
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup
