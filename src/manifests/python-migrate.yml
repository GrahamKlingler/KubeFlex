apiVersion: v1
kind: Pod
metadata:
  name: python-migrate-service
  namespace: monitor
  labels:
    name: python-migrate-service
    version: "3.0"
    runtime: "containerd"
spec:
  serviceAccountName: controller-account
  containers:
  - name: python-migrate
    image: grahamklingler26/python-migrate:latest
    imagePullPolicy: IfNotPresent
    command: ["/start.sh"]
    ports:
    - name: http
      containerPort: 8000
      protocol: TCP
    env:
    - name: KUBECONFIG
      value: /root/.kube/config
    - name: CONTAINERD_SOCKET
      value: /run/containerd/containerd.sock
    - name: CONTAINERD_NAMESPACE
      value: "test-namespace"
    - name: CRIU_PATH
      value: /usr/sbin/criu
    volumeMounts:
    - name: kube-config
      mountPath: /root/.kube
    - name: containerd-sock
      mountPath: /run/containerd
    - name: proc
      mountPath: /proc
    - name: sys
      mountPath: /sys
    - name: dev
      mountPath: /dev
    - name: var-run
      mountPath: /var/run
    - name: cgroup
      mountPath: /sys/fs/cgroup 
    - name: checkpoints
      mountPath: /tmp/checkpoints
    securityContext:
      privileged: true  # Required for containerd checkpoint operations
      capabilities:
        add:
        - ALL
      runAsUser: 0  # Run as root to access Docker socket
      runAsGroup: 0
    resources:
      requests:
        memory: "512Mi"
        cpu: "1000m"
      limits:
        memory: "1Gi"
        cpu: "2000m"
  volumes:
  - name: kube-config
    hostPath:
      path: /root/.kube
      type: DirectoryOrCreate
  - name: containerd-sock
    hostPath:
      path: /run/containerd
      type: DirectoryOrCreate
  - name: proc
    hostPath:
      path: /proc
      type: Directory
  - name: sys
    hostPath:
      path: /sys
      type: Directory
  - name: dev
    hostPath:
      path: /dev
      type: Directory
  - name: var-run
    hostPath:
      path: /var/run
      type: Directory
  - name: cgroup
    hostPath:
      path: /sys/fs/cgroup
      type: Directory
  - name: checkpoints
    hostPath:
      path: /tmp/checkpoints
      type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: python-migrate-service
  namespace: monitor
  labels:
    version: "3.0"
spec:
  selector:
    name: python-migrate-service
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
