apiVersion: v1
kind: PersistentVolume
metadata:
  name: video-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /Users/sfarokhi/School/Flex-Nautilus/src/scripts/vlc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: video-pvc
  namespace: foo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# Deployment for VLC streaming server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vlc-streaming-server
  labels:
    app: vlc-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vlc-streaming
  template:
    metadata:
      labels:
        app: vlc-streaming
    spec:
      containers:
      - name: vlc-server
        image: salamander1223/vlc-streaming:latest  # You'll need to build this image using the Dockerfile
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8554
          name: vlc-stream
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          runAsUser: 1001
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: media-volume
          mountPath: /home/vlcuser/media
          readOnly: true
        command: ["vlc"]
        args:
          - "-I"
          - "dummy"
          - "--no-video-title-show"
          - "/home/vlcuser/media/sample_video.mp4"
          - "--sout"
          - "#standard{access=http,mux=ts,dst=:8554}"
          - "--loop"
      volumes:
      - name: media-volume
        persistentVolumeClaim:
          claimName: video-pvc

---
# Service to expose the VLC streaming server
apiVersion: v1
kind: Service
metadata:
  name: vlc-streaming-service
spec:
  selector:
    app: vlc-streaming
  ports:
  - port: 8554
    targetPort: 8554
    protocol: TCP
    name: http-stream
  type: ClusterIP  # Change to NodePort or LoadBalancer if needed for external access

---
# Optional: Ingress for external access if needed
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlc-streaming-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: stream.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vlc-streaming-service
            port:
              number: 8554